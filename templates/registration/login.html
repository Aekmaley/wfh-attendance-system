<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบลงชื่อปฏิบัติงานออนไลน์</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="login-bg">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-4 col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4 p-lg-5">
            <div class="text-center mb-4">
              <div class="logo-circle mb-3"><i class="bi bi-building-fill-check"></i></div>
              <h3 class="fw-bold text-primary mb-1">ระบบลงชื่อปฏิบัติงานออนไลน์</h3>
              <p class="text-muted mb-0">Work From Home / ภารกิจราชการ</p>
            </div>
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
              </div>
              {% if form.errors %}
                <div class="alert alert-danger">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
              {% endif %}
              <button type="submit" class="btn btn-primary btn-lg w-100">เข้าสู่ระบบ</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
