{% extends 'attendance/base.html' %}
{% block title %}ลบผู้ใช้งาน{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-3">ยืนยันการลบผู้ใช้งาน</h4>
        <p>ต้องการลบผู้ใช้ <strong>{{ user_obj.username }}</strong> ใช่หรือไม่</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger">ลบข้อมูล</button>
          <a href="{% url 'user_management' %}" class="btn btn-outline-secondary">ยกเลิก</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
